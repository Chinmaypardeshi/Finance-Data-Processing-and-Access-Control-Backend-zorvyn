spring.application.name=finance-dashboard


# ===============================
# 1. DATABASE CONNECTION (MySQL)
# ===============================
# Change 'finance_db' to whatever you named your database in MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/zorvyn
spring.datasource.username=root
# Put your actual MySQL password here
spring.datasource.password=root

# ===============================
# 2. HIBERNATE & JPA SETTINGS
# ===============================
# This is the magic line! "update" tells Hibernate to automatically create 
# or update your MySQL tables to match your Java @Entity classes.
spring.jpa.hibernate.ddl-auto=create

# Show the actual SQL queries in the console (great for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate to use the specific SQL dialect for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# 3. SERVER SETTINGS (Optional but good)
# ===============================
server.port=8080